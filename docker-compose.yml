services:
  logstream:
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      - ${LOG_DIR}:${LOG_DIR}:ro
    environment:
      SPRING_PROFILES_ACTIVE: prod
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-log-dashboard}
      KAFKA_MAX_POLL_RECORDS: ${KAFKA_MAX_POLL_RECORDS:-500}
      LOGSTREAM_TOPICS: ${LOGSTREAM_TOPICS}
      LOGSTREAM_ALLOWED_ORIGINS: ${LOGSTREAM_ALLOWED_ORIGINS}
      JVM_MAX_HEAP: ${JVM_MAX_HEAP:-512m}
      LOGSTREAM_LOG_FILES_SERVER_TOPIC: ${LOGSTREAM_LOG_FILES_SERVER_TOPIC}
      LOGSTREAM_LOG_FILES_SYSTEM_TOPIC: ${LOGSTREAM_LOG_FILES_SYSTEM_TOPIC}
      LOGSTREAM_LOG_FILES_APP1_TOPIC: ${LOGSTREAM_LOG_FILES_APP1_TOPIC}
      LOGSTREAM_LOG_FILES_APP2_TOPIC: ${LOGSTREAM_LOG_FILES_APP2_TOPIC}
      LOGSTREAM_LOG_FILES_APP3_TOPIC: ${LOGSTREAM_LOG_FILES_APP3_TOPIC}
      LOGSTREAM_LOG_FILES_APP4_TOPIC: ${LOGSTREAM_LOG_FILES_APP4_TOPIC}
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "2.0"
        reservations:
          memory: 384m
          cpus: "0.5"
    restart: unless-stopped
