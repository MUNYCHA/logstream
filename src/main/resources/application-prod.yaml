server:
  port: ${SERVER_PORT:8080}

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:log-dashboard}
      auto-offset-reset: latest
      max-poll-records: ${KAFKA_MAX_POLL_RECORDS:500}
      fetch-min-size: 1
      fetch-max-wait: 200ms

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: org.munycha.logstream.model
        spring.json.use.type.headers: false
        spring.json.value.default.type: org.munycha.logstream.model.LogEvent

    listener:
      type: batch

logstream:
  topics: ${LOGSTREAM_TOPICS}
  allowed-origins: ${LOGSTREAM_ALLOWED_ORIGINS}
  log-files:
    server-topic: ${LOGSTREAM_LOG_FILES_SERVER_TOPIC}
    system-topic: ${LOGSTREAM_LOG_FILES_SYSTEM_TOPIC}
    app1-topic: ${LOGSTREAM_LOG_FILES_APP1_TOPIC}
    app2-topic: ${LOGSTREAM_LOG_FILES_APP2_TOPIC}
    app3-topic: ${LOGSTREAM_LOG_FILES_APP3_TOPIC}
    app4-topic: ${LOGSTREAM_LOG_FILES_APP4_TOPIC}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
